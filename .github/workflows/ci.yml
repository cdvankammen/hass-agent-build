name: CI

on:
  push:
    branches: [ main, feature/linux-headless-import ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/HASS.Agent.Linux.sln

      - name: Build
        run: dotnet build src/HASS.Agent.Linux.sln -c Release --no-restore
