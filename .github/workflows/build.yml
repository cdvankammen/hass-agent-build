name: Build and Test

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  
jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            solution: src/HASS.Agent.Linux.sln
            runtime: linux-x64
            artifact_name: hass-agent-linux-x64
          - os: macos-latest
            solution: src/HASS.Agent.Linux.sln
            runtime: osx-arm64
            artifact_name: hass-agent-macos-arm64
          - os: windows-latest
            solution: src/HASS.Agent.Linux.sln
            runtime: win-x64
            artifact_name: hass-agent-windows-x64
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore ${{ matrix.solution }}
      
    - name: Build
      run: dotnet build ${{ matrix.solution }} -c Release --no-restore
      
    - name: Test
      run: dotnet test ${{ matrix.solution }} -c Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.os }}
        path: '**/TestResults/*.trx'
        
    - name: Publish Headless
      run: |
        dotnet publish src/HASS.Agent.Headless/HASS.Agent.Headless.csproj \
          -c Release \
          -r ${{ matrix.runtime }} \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:EnableCompressionInSingleFile=true \
          -o publish/headless
          
    - name: Publish GUI (Avalonia)
      run: |
        dotnet publish src/HASS.Agent.Avalonia/HASS.Agent.Avalonia.csproj \
          -c Release \
          -r ${{ matrix.runtime }} \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:EnableCompressionInSingleFile=true \
          -o publish/gui
          
    - name: Create archive (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        mkdir -p artifacts
        tar -czvf artifacts/${{ matrix.artifact_name }}.tar.gz -C publish .
        
    - name: Create archive (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        mkdir artifacts
        Compress-Archive -Path publish\* -DestinationPath artifacts\${{ matrix.artifact_name }}.zip
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: artifacts/

  build-deb:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Build Debian Package
      run: |
        chmod +x scripts/build-deb.sh
        ./scripts/build-deb.sh
        
    - name: Upload DEB package
      uses: actions/upload-artifact@v4
      with:
        name: hass-agent-debian
        path: build/deb/*.deb

  build-dmg:
    runs-on: macos-latest
    needs: build-and-test
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Build DMG
      run: |
        chmod +x scripts/build-dmg.sh
        ./scripts/build-dmg.sh
        
    - name: Upload DMG
      uses: actions/upload-artifact@v4
      with:
        name: hass-agent-macos-dmg
        path: build/macos/*.dmg

  release:
    runs-on: ubuntu-latest
    needs: [build-and-test, build-deb, build-dmg]
    if: github.event_name == 'release'
    permissions:
      contents: write
    
    steps:
    - name: Download release artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: 'hass-agent-*'
        merge-multiple: true
        path: release-artifacts

    - name: Compute checksums
      run: |
        cd release-artifacts
        find . -maxdepth 1 -type f ! -name 'checksums.sha256' -print0 | sort -z | xargs -0 sha256sum > checksums.sha256
        
    - name: Upload Release Assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release-artifacts/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
